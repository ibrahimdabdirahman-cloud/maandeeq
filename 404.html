<!doctype html>
<html lang="en">
<head>
<meta name="robots" content="noindex">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#14110D" />
<title>Page not found · Maandeeq Restaurant</title>
<link rel="icon" type="image/png" sizes="64x64" href="assets/brand/favicon.png" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/brand/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Manrope:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#14110D; --paper:#F5EFE6; --gold:#D4A24C; --gold-dk:#B7873A; --camel-dk:#6A4F38;
    --serif:"Bodoni Moda","Didot",serif;
    --sans:"Manrope",-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:"Space Mono",ui-monospace,Menlo,monospace;
    --r-pill:999px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:var(--sans);
    color:var(--paper);
    background:
      radial-gradient(120% 70% at 50% 0%, rgba(212,162,76,0.18), transparent 55%),
      linear-gradient(180deg,#14110D 0%, #1B1610 100%);
    min-height:100svh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;
    padding:40px 24px;
    overflow:hidden;
    position:relative;
  }
  a{color:inherit;text-decoration:none}
  .camel{
    position:absolute;inset:auto 0 -16% 0;margin:0 auto;
    width:min(560px,130%);opacity:.05;pointer-events:none;filter:invert(1);
  }
  .logo{width:78px;height:78px;border-radius:50%;object-fit:cover;margin-bottom:30px;position:relative;z-index:1}
  .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:0.3em;text-transform:uppercase;
    color:var(--gold);display:inline-flex;align-items:center;gap:12px;position:relative;z-index:1;
  }
  .eyebrow::before,.eyebrow::after{content:"";display:block;width:24px;height:1px;background:rgba(212,162,76,.45)}
  h1{
    font-family:var(--serif);font-weight:500;
    font-size:clamp(56px,13vw,120px);line-height:0.92;letter-spacing:-0.03em;
    margin:16px 0 4px;position:relative;z-index:1;
  }
  h1 em{font-style:italic;color:var(--gold);font-weight:400}
  .lede{
    font-family:var(--serif);font-style:italic;font-size:clamp(18px,2.4vw,22px);
    line-height:1.45;color:rgba(245,239,230,0.8);max-width:38ch;margin:0 auto 34px;
    position:relative;z-index:1;
  }
  .row{display:inline-flex;flex-wrap:wrap;gap:10px;justify-content:center;position:relative;z-index:1}
  .btn{
    display:inline-flex;align-items:center;gap:9px;padding:14px 22px;border-radius:var(--r-pill);
    font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;
    transition:background .2s ease,color .2s ease,border-color .2s ease;border:1px solid transparent;
  }
  .btn--gold{background:var(--gold);color:var(--ink)}
  .btn--gold:hover{background:var(--gold-dk)}
  .btn--ghost{border-color:rgba(245,239,230,0.25);color:var(--paper)}
  .btn--ghost:hover{background:rgba(245,239,230,0.08)}
  .legal{
    font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;
    color:rgba(245,239,230,0.4);margin-top:48px;position:relative;z-index:1;
  }
</style>
</head>
<body>
  <img class="camel" src="assets/brand/logo-transparent.png" alt="" aria-hidden="true" />
  <img class="logo" src="assets/brand/logo-circle.png" alt="Maandeeq Restaurant" / loading="lazy" decoding="async">
  <div class="eyebrow">Error 404</div>
  <h1>This table's <em>not set</em>.</h1>
  <p class="lede">The page you're looking for has wandered off — but our kitchen is still open and the kettle's on for shaah.</p>
  <div class="row">
    <a class="btn btn--gold" href="index.html">
      Back home
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
    </a>
    <a class="btn btn--ghost" href="Menu.html">See the menu</a>
    <a class="btn btn--ghost" href="Contact.html">Visit us</a>
  </div>
  <p class="legal">© Maandeeq Restaurant · Woolwich, London</p>
</body>
</html>
